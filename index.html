<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Day Pharmacy Roster Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type="time"] { min-width: 100px; }
        .day-tab.active { background-color: #2563eb; color: white; border-color: #2563eb; }

        /* Print Specific Styles */
        @media print {
            @page { size: landscape; margin: 10mm; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white !important; padding-bottom: 0 !important; }
            .max-w-4xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            input, select { border: none !important; background: none !important; appearance: none !important; padding: 0 !important; font-size: 11px !important; }
            .shadow-sm, .shadow-lg { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
            .roster-card { border: 1px solid #e2e8f0 !important; border-radius: 8px !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900">

    <!-- Print Headers (Hidden on screen) -->
    <div id="printHeader" class="print-only p-4 border-b mb-4">
        <div class="flex justify-between items-end">
            <div>
                <h1 id="printTitle" class="text-xl font-bold">Pharmacy Roster</h1>
                <p id="printSubtitle" class="text-slate-500 text-sm"></p>
            </div>
            <div id="printStats" class="text-right text-sm font-bold space-y-1">
                <!-- Stats injected here -->
            </div>
        </div>
    </div>

    <div id="weeklyPrintSummary" class="print-only px-4">
        <div id="printTableContainer"></div>
    </div>

    <div class="max-w-4xl mx-auto px-4 pt-8 no-print">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">7-Day Roster Planner</h1>
                <div class="mt-2 flex items-center gap-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Week Beginning:</label>
                    <input type="date" id="weekStart" onchange="updateDates()" class="text-xs font-semibold bg-white border border-slate-200 rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex gap-6">
                <div class="text-right border-r border-slate-100 pr-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Daily Cost</p>
                    <h2 id="totalDailyCost" class="text-2xl font-black text-slate-800">$0.00</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">Weekly Total</p>
                    <h2 id="totalWeeklyCost" class="text-2xl font-black text-blue-600">$0.00</h2>
                </div>
            </div>
        </div>

        <!-- Day Navigation -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="switchDay(0)" id="tab-0" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50">Mon</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
            <button onclick="switchDay(1)" id="tab-1" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50">Tue</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
            <button onclick="switchDay(2)" id="tab-2" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50">Wed</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
            <button onclick="switchDay(3)" id="tab-3" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50">Thu</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
            <button onclick="switchDay(4)" id="tab-4" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50">Fri</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
            <button onclick="switchDay(5)" id="tab-5" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50 text-blue-400">Sat</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
            <button onclick="switchDay(6)" id="tab-6" class="day-tab flex-1 py-2 px-1 rounded-xl text-center border bg-white transition-all hover:bg-slate-50">
                <div class="text-[10px] font-black uppercase opacity-50 text-red-400">Sun</div>
                <div class="text-xs font-bold day-date">--/--</div>
            </button>
        </div>

        <!-- Roster Table -->
        <div id="rosterCard" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden roster-card">
            <div class="bg-slate-900 p-4 flex justify-between items-center text-white no-print">
                <span id="currentDayTitle" class="text-sm font-bold uppercase tracking-widest">Monday Schedule</span>
                <button onclick="addShift()" class="bg-blue-600 hover:bg-blue-500 text-xs px-4 py-2 rounded-lg font-bold transition-colors shadow-lg">+ Add Shift</button>
            </div>
            
            <div class="hidden md:grid grid-cols-12 gap-2 p-3 bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-tighter">
                <div class="col-span-3">Staff Name / Role</div>
                <div class="col-span-2 text-center">Start Time</div>
                <div class="col-span-2 text-center">End Time</div>
                <div class="col-span-2">Rate ($/hr)</div>
                <div class="col-span-2 text-right">Subtotal</div>
                <div class="col-span-1 no-print"></div>
            </div>

            <div id="shiftList" class="divide-y divide-slate-100">
                <!-- Shifts injected here -->
            </div>

            <div id="emptyState" class="p-16 text-center hidden no-print">
                <div class="text-4xl mb-2">🗓️</div>
                <p class="text-slate-400 text-sm">No shifts for this day yet.</p>
            </div>
        </div>

        <!-- Coverage/Action Area -->
        <div class="mt-6 flex flex-col md:flex-row gap-4 no-print">
            <div id="coverageWarning" class="flex-1 p-4 bg-amber-50 border border-amber-200 rounded-xl flex items-start gap-3 hidden">
                <span class="text-xl">⚠️</span>
                <div>
                    <p class="text-sm font-bold text-amber-800">Pharmacy Coverage Issue</p>
                    <p class="text-xs text-amber-700">Dispensary safety requires at least one Pharmacist on duty.</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="printDaily()" class="px-6 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-all">
                    Print Daily
                </button>
                <button onclick="printWeekly()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">
                    Print Weekly Summary
                </button>
                <button onclick="clearAllData()" class="px-6 py-3 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 transition-all">
                    Clear Week
                </button>
            </div>
        </div>
    </div>

    <script>
        const dayNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        let currentDay = 0;
        
        let weeklyData = JSON.parse(localStorage.getItem('ph_roster_data')) || [[], [], [], [], [], [], []];
        let weekStartStr = localStorage.getItem('ph_roster_date') || new Date().toISOString().split('T')[0];

        function updateDates() {
            weekStartStr = document.getElementById('weekStart').value;
            localStorage.setItem('ph_roster_date', weekStartStr);
            
            const startDate = new Date(weekStartStr);
            const dateLabels = document.querySelectorAll('.day-date');
            
            dateLabels.forEach((label, idx) => {
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + idx);
                const dd = String(d.getDate()).padStart(2, '0');
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                label.innerText = `${dd}/${mm}`;
            });
            renderUI();
        }

        function switchDay(index) {
            currentDay = index;
            renderUI();
        }

        function addShift() {
            const id = Date.now();
            weeklyData[currentDay].push({ id, name: 'Staff Name', role: 'as', start: '09:00', end: '17:00', rate: 28 });
            saveAndRender();
        }

        function removeShift(id) {
            weeklyData[currentDay] = weeklyData[currentDay].filter(s => s.id !== id);
            saveAndRender();
        }

        function updateShift(id, field, value) {
            const shift = weeklyData[currentDay].find(s => s.id === id);
            if (shift) {
                shift[field] = (field === 'rate') ? parseFloat(value) || 0 : value;
                saveAndRender();
            }
        }

        function calculateHours(start, end) {
            if (!start || !end) return 0;
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            const diff = (eH + eM/60) - (sH + sM/60);
            return diff > 0 ? diff : 0;
        }

        function saveAndRender() {
            localStorage.setItem('ph_roster_data', JSON.stringify(weeklyData));
            renderUI();
        }

        function clearAllData() {
            if(confirm("Are you sure you want to clear the entire week?")) {
                weeklyData = [[],[],[],[],[],[],[]];
                saveAndRender();
            }
        }

        function renderUI() {
            document.querySelectorAll('.day-tab').forEach((tab, idx) => {
                tab.classList.toggle('active', idx === currentDay);
            });

            const startDate = new Date(weekStartStr);
            const d = new Date(startDate);
            d.setDate(startDate.getDate() + currentDay);
            const dateStr = d.toLocaleDateString('en-AU');

            document.getElementById('currentDayTitle').innerText = `${dayNames[currentDay]} - ${dateStr}`;
            const list = document.getElementById('shiftList');
            const empty = document.getElementById('emptyState');
            const dayShifts = weeklyData[currentDay];

            if (dayShifts.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                list.innerHTML = dayShifts.map(shift => `
                    <div class="p-3 md:grid md:grid-cols-12 gap-2 flex flex-col items-center border-b border-slate-50">
                        <div class="col-span-3 w-full">
                            <input type="text" value="${shift.name}" onchange="updateShift(${shift.id}, 'name', this.value)" 
                                class="font-bold text-slate-700 border-none bg-transparent focus:ring-0 w-full p-0 text-sm">
                            <select onchange="updateShift(${shift.id}, 'role', this.value)" 
                                class="text-[10px] text-slate-400 bg-transparent border-none p-0 focus:ring-0 uppercase font-bold cursor-pointer">
                                <option value="ph" ${shift.role === 'ph' ? 'selected' : ''}>Pharmacist</option>
                                <option value="as" ${shift.role === 'as' ? 'selected' : ''}>Assistant</option>
                            </select>
                        </div>
                        <div class="col-span-2 flex items-center justify-center">
                            <input type="time" value="${shift.start}" onchange="updateShift(${shift.id}, 'start', this.value)" class="text-sm border border-slate-200 rounded-lg px-2 py-1">
                        </div>
                        <div class="col-span-2 flex items-center justify-center">
                            <input type="time" value="${shift.end}" onchange="updateShift(${shift.id}, 'end', this.value)" class="text-sm border border-slate-200 rounded-lg px-2 py-1">
                        </div>
                        <div class="col-span-2 relative">
                            <span class="absolute left-2 top-1.5 text-slate-300 text-sm no-print">$</span>
                            <input type="number" value="${shift.rate}" onchange="updateShift(${shift.id}, 'rate', this.value)" class="w-full text-sm border border-slate-200 rounded-lg pl-5 pr-2 py-1">
                        </div>
                        <div class="col-span-2 text-right self-center">
                            <p class="text-sm font-bold text-slate-800">$${(calculateHours(shift.start, shift.end) * shift.rate).toFixed(2)}</p>
                        </div>
                        <div class="col-span-1 text-right self-center no-print">
                            <button onclick="removeShift(${shift.id})" class="text-slate-300 hover:text-red-500 transition-colors p-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            updateTotals();
        }

        function updateTotals() {
            let weeklyTotal = 0;
            let dailyTotal = 0;
            let hasPharmacistToday = false;
            let daysWithStaff = 0;

            weeklyData.forEach((day, idx) => {
                let dayCost = 0;
                day.forEach(shift => {
                    const hours = calculateHours(shift.start, shift.end);
                    dayCost += hours * shift.rate;
                    if (idx === currentDay && shift.role === 'ph' && hours > 0) hasPharmacistToday = true;
                });
                weeklyTotal += dayCost;
                if (dayCost > 0) daysWithStaff++;
                if (idx === currentDay) dailyTotal = dayCost;
            });

            document.getElementById('totalDailyCost').innerText = `$${dailyTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalWeeklyCost').innerText = `$${weeklyTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const warning = document.getElementById('coverageWarning');
            if (!hasPharmacistToday && weeklyData[currentDay].length > 0) {
                warning.classList.remove('hidden');
            } else {
                warning.classList.add('hidden');
            }

            return { weeklyTotal, daysWithStaff };
        }

        function printDaily() {
            const startDate = new Date(weekStartStr);
            const d = new Date(startDate);
            d.setDate(startDate.getDate() + currentDay);
            
            document.getElementById('printTitle').innerText = "Daily Pharmacy Roster";
            document.getElementById('printSubtitle').innerText = `${dayNames[currentDay]}, ${d.toLocaleDateString('en-AU')}`;
            document.getElementById('printStats').innerHTML = "";
            document.getElementById('printTableContainer').innerHTML = ""; 
            
            window.print();
        }

        function printWeekly() {
            const container = document.getElementById('printTableContainer');
            const statsContainer = document.getElementById('printStats');
            const startDate = new Date(weekStartStr);
            const dEnd = new Date(startDate);
            dEnd.setDate(startDate.getDate() + 6);

            const totals = updateTotals();
            const avgCost = totals.daysWithStaff > 0 ? (totals.weeklyTotal / totals.daysWithStaff) : 0;

            document.getElementById('printTitle').innerText = "Weekly Pharmacy Roster Summary";
            document.getElementById('printSubtitle').innerText = `Period: ${startDate.toLocaleDateString('en-AU')} to ${dEnd.toLocaleDateString('en-AU')}`;
            
            statsContainer.innerHTML = `
                <div>Weekly Expenditure: $${totals.weeklyTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                <div class="text-blue-600 font-bold">Average Daily Cost: $${avgCost.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
            `;

            // Landscape Horizontal Layout (7 columns)
            let html = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;">';
            
            weeklyData.forEach((day, idx) => {
                const dDay = new Date(startDate);
                dDay.setDate(startDate.getDate() + idx);
                let dayCost = 0;
                day.forEach(s => dayCost += (calculateHours(s.start, s.end) * s.rate));

                html += `
                    <div style="border: 1px solid #e2e8f0; border-radius: 4px; display: flex; flex-direction: column;">
                        <div style="background: #f8fafc; padding: 4px; text-align: center; border-bottom: 1px solid #e2e8f0;">
                            <div style="font-weight: 800; font-size: 10px; text-transform: uppercase;">${dayNames[idx]}</div>
                            <div style="font-size: 9px; color: #64748b;">${dDay.toLocaleDateString('en-AU')}</div>
                        </div>
                        <div style="flex-grow: 1; min-height: 100px; padding: 4px; font-size: 9px;">
                            ${day.length === 0 ? '<div style="color:#cbd5e1; text-align:center; padding-top:20px;">Closed</div>' : 
                              day.map(s => `
                                <div style="margin-bottom: 6px; border-bottom: 1px dashed #f1f5f9; padding-bottom: 4px;">
                                    <div style="font-weight: 700;">${s.name}</div>
                                    <div style="color: #64748b; font-size: 8px;">${s.role === 'ph' ? 'PH' : 'ASST'}</div>
                                    <div style="font-weight: 600;">${s.start}-${s.end}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="background: #f8fafc; padding: 4px; text-align: right; border-top: 1px solid #e2e8f0; font-weight: 800; font-size: 10px;">
                            $${dayCost.toFixed(2)}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
            window.print();
        }

        // Init
        document.getElementById('weekStart').value = weekStartStr;
        updateDates();
    </script>
</body>
</html>
